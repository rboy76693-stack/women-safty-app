version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: safety-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: safety-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/womens-safety

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: safety-client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server

volumes:
  mongo-data:
